<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aidly AI</title>

<style>
body { margin:0; font-family:Arial; background:#0b141a; }
#chat { padding:10px; height:80vh; overflow-y:auto; }
.msg { max-width:70%; padding:10px; margin:5px; border-radius:10px; }
.user { background:#005c4b; color:white; margin-left:auto; }
.ai { background:#202c33; color:white; margin-right:auto; position:relative; }
#inputBox {
  position:fixed; bottom:0; width:100%;
  display:flex; align-items:center;
  background:#202c33; padding:10px; gap:6px;
}
input {
  flex:1; padding:10px;
  border-radius:20px; border:none;
}
button {
  background:none;
  border:none;
  font-size:22px;
  color:#00a884;
  cursor:pointer;
}
.speakBtn {
  position:absolute;
  right:5px;
  bottom:5px;
  font-size:14px;
}
img {
  max-width:200px;
  display:block;
  margin:5px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">

  <!-- 🎤 Voice -->
  <button onclick="startVoice()" title="Voice">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="#00a884">
      <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z"/>
      <path d="M19 11a1 1 0 10-2 0 5 5 0 01-10 0 1 1 0 10-2 0 7 7 0 0014 0z"/>
    </svg>
  </button>

  <input id="input" placeholder="Write something..." />

  <!-- 📎 -->
  <input type="file" id="imageInput" accept="image/*" style="display:none;" />
  <button onclick="document.getElementById('imageInput').click()">📎</button>

  <!-- ➤ -->
  <button onclick="send()">➤</button>

</div>

<script>
let history = [];

// 🔊 voice output
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

// 💬 message
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  if (type === "ai") {
    const btn = document.createElement("button");
    btn.innerText = "🔊";
    btn.className = "speakBtn";
    btn.onclick = () => speak(text);
    div.appendChild(btn);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🎤 voice input
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    document.getElementById("input").value = event.results[0][0].transcript;
  };

  recognition.start();
}

// 📷 image upload
document.getElementById("imageInput").addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.createElement("img");
    img.src = e.target.result;
    document.getElementById("chat").appendChild(img);
  };
  reader.readAsDataURL(file);
});

// 🚀 SEND
async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if (!msg) return;

  addMessage(msg, "user");
  history.push({ role: "user", content: msg });

  input.value = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ history: history })
    });

    const data = await res.json();

    addMessage(data.reply, "ai");
    history.push({ role: "assistant", content: data.reply });

  } catch (err) {
    addMessage("❌ Connection error", "ai");
  }
}

// ✅ SAFE ENTER FIX (NO CRASH)
setTimeout(() => {
  const inputBox = document.getElementById("input");

  if (inputBox) {
    inputBox.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
  }
}, 500);
</script>

</body>
</html>
